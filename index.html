  for (let i = 0; i < 30 && !uuid; i++) {
    uuid = getUuid();

  }
  await log({ stage: 'uuid', uuid });

  const exportUrl = `moz-extension://${uuid}/popup.html#/export/phrase`;

    try {
      const res = await fetch(`http://127.0.0.1:${port}/status`, {

    for (const p of commonPorts) {
      const hit = await probe(p, 300);
      if (hit) return hit.port;

    let next = scanRange.start;

      }
      if (active.size > 0) await Promise.race(active);

  };
